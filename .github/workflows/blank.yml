name: qwen35-1hour-demo-ultra-verbose-before-after

on:
  workflow_dispatch:
    inputs:
      model_name:
        description: 'MLX model id'
        required: false
        default: 'mlx-community/Qwen3.5-2B-MLX-4bit'
      learning_rate:
        description: 'LoRA learning rate'
        required: false
        default: '1e-4'
      wall_clock_budget_minutes:
        description: 'Soft stop budget for the demo job'
        required: false
        default: '60'

jobs:
  demo:
    runs-on: macos-14
    timeout-minutes: 60
    env:
      PYTHONUNBUFFERED: '1'
      HF_HUB_ENABLE_HF_TRANSFER: '1'
      PROJECT_NAME: qwen35_1hour_demo_ultra_verbose_before_after
      EMBEDDED_DATASET_GZ_B64: |
        

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Restore model cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/huggingface
            ~/Library/Caches/huggingface
          key: ${{ runner.os }}-${{ runner.arch }}-hf-qwen35-2b-mlx4bit-v1

      - name: Install dependencies
        shell: bash
        run: |
          set -euxo pipefail
          python -m pip install --upgrade pip
          pip install mlx-lm huggingface_hub hf_transfer

      - name: Run one-hour ultra-verbose before/after demo
        shell: bash
        run: |
          set -euxo pipefail
          cat > run_1hour_demo.py <<'PY'
          import os
          import gc
          import sys
          import json
          import time
          import gzip
          import base64
          import shutil
          import pathlib
          import subprocess

          PROJECT_NAME = os.environ.get("PROJECT_NAME", "qwen35_1hour_demo_ultra_verbose_before_after")
          MODEL_NAME = os.environ.get("INPUT_MODEL_NAME") or "${{ inputs.model_name }}"
          LEARNING_RATE = os.environ.get("INPUT_LEARNING_RATE") or "${{ inputs.learning_rate }}"
          WALL_CLOCK_BUDGET_MINUTES = int(os.environ.get("INPUT_WALL_CLOCK_BUDGET_MINUTES") or "${{ inputs.wall_clock_budget_minutes }}")
          EMBEDDED_DATASET_GZ_B64 = os.environ["EMBEDDED_DATASET_GZ_B64"]

          DEMO_PLAN = [
              {"label": "ultra_s1_i1", "subset_size": 1, "iters": 1, "forward_repeats": 1},
              {"label": "ultra_s1_i5", "subset_size": 1, "iters": 5, "forward_repeats": 1},
              {"label": "ultra_s10_i1", "subset_size": 10, "iters": 1, "forward_repeats": 1},
              {"label": "ultra_s10_i5", "subset_size": 10, "iters": 5, "forward_repeats": 1},
              {"label": "ultra_s10_i5_r2", "subset_size": 10, "iters": 5, "forward_repeats": 2},
          ]

          def log(title):
              print("=" * 120)
              print(title)
              print("=" * 120)

          def sanitize_text(text):
              if text is None:
                  return ""
              return str(text).replace("\r\n", "\n").replace("\r", "\n").strip()

          def truncate_text(text, max_chars):
              return sanitize_text(text)[:max_chars]

          def build_ultra_verbose_example(record):
              problem = truncate_text(record.get("problem", ""), 800)
              thinking = truncate_text(record.get("thinking", ""), 1400)
              solution = truncate_text(record.get("solution", ""), 300)

              prompt = (
                  "You are an ultra-verbose mathematical reasoning assistant.\n"
                  "Solve the following problem carefully.\n"
                  "Explain every major step in detail.\n"
                  "State intermediate calculations explicitly.\n"
                  "Double-check your arithmetic before giving the final answer.\n"
                  "Be highly verbose, structured, and explicit.\n\n"
                  "Problem:\n"
                  f"{problem}\n\n"
                  "You must answer in exactly this format:\n"
                  "<think>\n"
                  "Detailed reasoning with multiple explicit steps, checks, and explanations.\n"
                  "</think>\n"
                  "Final answer: <your final answer>"
              )

              completion = (
                  "<think>\n"
                  f"{thinking}\n"
                  "\n"
                  "I will double-check the reasoning above before finalizing the answer.\n"
                  "</think>\n"
                  "Final answer: "
                  f"{solution}"
              )

              return {"prompt": prompt, "completion": completion}

          def decode_records():
              payload = "".join(EMBEDDED_DATASET_GZ_B64.split())
              raw = gzip.decompress(base64.b64decode(payload))
              return json.loads(raw.decode("utf-8"))

          def write_jsonl(path, rows):
              with open(path, "w", encoding="utf-8") as f:
                  for row in rows:
                      f.write(json.dumps(row, ensure_ascii=False) + "\n")

          def run_cmd(cmd):
              start = time.perf_counter()
              proc = subprocess.run(cmd, capture_output=True, text=True)
              elapsed = time.perf_counter() - start
              return proc, elapsed

          def timed_generate(model_name, prompt, adapter_path=None):
              cmd = [
                  "python", "-m", "mlx_lm", "generate",
                  "--model", model_name,
                  "--prompt", prompt,
                  "--max-tokens", "220",
                  "--temp", "0",
              ]
              if adapter_path:
                  cmd.extend(["--adapter-path", adapter_path])
              proc, elapsed = run_cmd(cmd)
              return proc.returncode, proc.stdout.strip(), proc.stderr.strip(), elapsed

          def summarize_text(text, limit=500):
              text = text.strip()
              if len(text) <= limit:
                  return text
              return text[:limit]

          def main():
              budget_seconds = WALL_CLOCK_BUDGET_MINUTES * 60
              start_time = time.perf_counter()

              log("ONE HOUR ULTRA-VERBOSE BEFORE/AFTER DEMO START")
              print(f"python_executable: {sys.executable}")
              print(f"python_version: {sys.version}")
              print(f"cwd: {os.getcwd()}")
              print(f"project_name: {PROJECT_NAME}")
              print(f"model_name: {MODEL_NAME}")
              print(f"learning_rate: {LEARNING_RATE}")
              print(f"wall_clock_budget_minutes: {WALL_CLOCK_BUDGET_MINUTES}")

              all_records = json.loads(gzip.decompress(base64.b64decode("".join(EMBEDDED_DATASET_GZ_B64.split()))).decode("utf-8"))
              examples = [build_ultra_verbose_example(r) for r in all_records[:10]]

              print(f"embedded_record_count: {len(examples)}")
              print(f"demo_plan: {json.dumps(DEMO_PLAN)}")

              work_root = pathlib.Path(f"./{PROJECT_NAME}_work")
              if work_root.exists():
                  shutil.rmtree(work_root)
              work_root.mkdir(parents=True, exist_ok=True)

              results = []

              for plan in DEMO_PLAN:
                  elapsed_total = time.perf_counter() - start_time
                  remaining = budget_seconds - elapsed_total
                  if remaining < 240:
                      print(f"Stopping early because remaining budget is only {remaining:.2f} seconds.")
                      break

                  label = plan["label"]
                  subset_size = plan["subset_size"]
                  train_iters = plan["iters"]
                  forward_repeats = plan["forward_repeats"]

                  log(f"RUN START {label}")
                  print(f"elapsed_total_seconds_before_run: {elapsed_total:.6f}")
                  print(f"remaining_budget_seconds_before_run: {remaining:.6f}")

                  subset_rows = examples[:subset_size]
                  subset_dir = work_root / label
                  data_dir = subset_dir / "data"
                  adapter_dir = subset_dir / "adapters"
                  data_dir.mkdir(parents=True, exist_ok=True)
                  adapter_dir.mkdir(parents=True, exist_ok=True)

                  write_jsonl(data_dir / "train.jsonl", subset_rows)
                  write_jsonl(data_dir / "test.jsonl", subset_rows[:1])

                  prompt = subset_rows[0]["prompt"]

                  print(f"train_rows: {len(subset_rows)}")
                  print(f"sample_prompt_preview: {prompt[:400]!r}")
                  print(f"sample_completion_preview: {subset_rows[0]['completion'][:400]!r}")

                  log(f"BASELINE FORWARD BEFORE FINETUNING {label}")
                  base_forward_times = []
                  base_outputs = []
                  for i in range(forward_repeats):
                      rc, out, err, f_elapsed = timed_generate(MODEL_NAME, prompt, None)
                      print(f"base_forward_run_{i+1:03d}_return_code: {rc}")
                      print(f"base_forward_run_{i+1:03d}_elapsed_seconds: {f_elapsed:.6f}")
                      print(f"base_forward_run_{i+1:03d}_stdout_preview: {summarize_text(out, 600)!r}")
                      if err:
                          print(f"base_forward_run_{i+1:03d}_stderr_preview: {summarize_text(err, 300)!r}")
                      if rc != 0:
                          raise RuntimeError(f"Baseline forward failed for {label} run {i+1}")
                      base_forward_times.append(f_elapsed)
                      base_outputs.append(summarize_text(out, 700))

                  gc.collect()
                  time.sleep(2)

                  log(f"TRAIN START {label}")
                  train_cmd = [
                      "python", "-m", "mlx_lm", "lora",
                      "--train",
                      "--model", MODEL_NAME,
                      "--data", str(data_dir),
                      "--adapter-path", str(adapter_dir),
                      "--iters", str(train_iters),
                      "--batch-size", "1",
                      "--learning-rate", str(LEARNING_RATE),
                      "--steps-per-report", "1",
                      "--steps-per-eval", "1000000",
                      "--mask-prompt",
                  ]
                  print("train_command:", " ".join(train_cmd))
                  train_proc, train_elapsed = run_cmd(train_cmd)
                  print("TRAIN STDOUT START")
                  print(train_proc.stdout)
                  print("TRAIN STDOUT END")
                  if train_proc.stderr:
                      print("TRAIN STDERR START")
                      print(train_proc.stderr)
                      print("TRAIN STDERR END")
                  print(f"train_return_code: {train_proc.returncode}")
                  print(f"train_elapsed_seconds: {train_elapsed:.6f}")
                  if train_proc.returncode != 0:
                      raise RuntimeError(f"Training failed for {label}")

                  adapter_file = adapter_dir / "adapters.safetensors"
                  if not adapter_file.exists():
                      raise RuntimeError(f"Expected adapter file missing for {label}")

                  gc.collect()
                  time.sleep(2)

                  log(f"TUNED FORWARD AFTER FINETUNING {label}")
                  tuned_forward_times = []
                  tuned_outputs = []
                  for i in range(forward_repeats):
                      rc, out, err, f_elapsed = timed_generate(MODEL_NAME, prompt, str(adapter_dir))
                      print(f"tuned_forward_run_{i+1:03d}_return_code: {rc}")
                      print(f"tuned_forward_run_{i+1:03d}_elapsed_seconds: {f_elapsed:.6f}")
                      print(f"tuned_forward_run_{i+1:03d}_stdout_preview: {summarize_text(out, 600)!r}")
                      if err:
                          print(f"tuned_forward_run_{i+1:03d}_stderr_preview: {summarize_text(err, 300)!r}")
                      if rc != 0:
                          raise RuntimeError(f"Tuned forward failed for {label} run {i+1}")
                      tuned_forward_times.append(f_elapsed)
                      tuned_outputs.append(summarize_text(out, 700))

                  avg_base = sum(base_forward_times) / len(base_forward_times)
                  avg_tuned = sum(tuned_forward_times) / len(tuned_forward_times)

                  results.append({
                      "label": label,
                      "subset_size": subset_size,
                      "train_iters": train_iters,
                      "forward_repeats": forward_repeats,
                      "before_finetuning": {
                          "avg_forward_seconds": avg_base,
                          "projected_forward_1k_seconds": avg_base * 1000.0,
                          "projected_forward_10k_seconds": avg_base * 10000.0,
                          "sample_output_preview": base_outputs[0],
                      },
                      "training": {
                          "train_elapsed_seconds": train_elapsed,
                          "train_seconds_per_iter": train_elapsed / train_iters,
                      },
                      "after_finetuning": {
                          "avg_forward_seconds": avg_tuned,
                          "projected_forward_1k_seconds": avg_tuned * 1000.0,
                          "projected_forward_10k_seconds": avg_tuned * 10000.0,
                          "sample_output_preview": tuned_outputs[0],
                      },
                      "delta_after_minus_before_seconds": avg_tuned - avg_base,
                      "elapsed_total_seconds_after_run": time.perf_counter() - start_time,
                  })

                  gc.collect()
                  time.sleep(2)

              total_elapsed = time.perf_counter() - start_time
              log("FINAL SUMMARY BEFORE VS AFTER FINETUNING")
              print(json.dumps({
                  "completed_runs": len(results),
                  "total_elapsed_seconds": total_elapsed,
                  "wall_clock_budget_seconds": budget_seconds,
                  "results": results,
              }, indent=2))

          if __name__ == "__main__":
              main()
          PY
          INPUT_MODEL_NAME="${{ inputs.model_name }}" \
          INPUT_LEARNING_RATE="${{ inputs.learning_rate }}" \
          INPUT_WALL_CLOCK_BUDGET_MINUTES="${{ inputs.wall_clock_budget_minutes }}" \
          python run_1hour_demo.py
